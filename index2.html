<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
<style>
body {
    font-family: Arial, sans-serif;
    background-color: #f4f4f4;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
}
.form-section {
        background-color: white;
        max-width: 600px;
        margin: 40px auto;
        padding: 30px;
        border-radius: 10px;
        box-shadow: 0 0 10px rgba(0,0,0,0.1);
}

input, select, textarea {
    width: 100%;
    padding: 10px;
    margin-bottom: 10px;
    border: 1px solid #ccc;
    border-radius: 4px;
    box-sizing: border-box;
}

button, .btn {
  background-color: rgb(6, 140, 251);
  color: aliceblue;
  width: 100px;               
  font-size: 20px;
  border: none;
  border-radius: 10px;
  cursor: pointer;
  align-items: center;
  justify-content: center;
  position: relative;
  left: 40%;
  margin-top: 1%;
}

    #enviarBtn:active {
      background-color: #176df7;
      transform: scale(0.95);


    }
 #mensagem {
      display: none;
      color: rgb(11, 37, 202);
      margin-top: 10px;
      font-weight: bold;
    }
.enviarBnt{
    background-color: #07b0fe;
}

     </style>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <div class="form-container">
        <section class="form-section" id="dados">
    <h2>Cadastro do Participante</h2>
    <p>Preencha seus dados para participar do projeto Aprenda e Proteja.</p>

    <form>
        <form id="meuFormulario">
            <label for="nome">Nome completo</label>
            <input type="text" id="nome" name="nome" placeholder="Digite seu nome" required>

            <label for="idade">Idade</label>
            <input type="number" id="idade" name="idade" placeholder="Digite sua idade" required>

            <label for="email">E-mail</label>
            <input type="email" id="email" name="email" placeholder="Digite seu e-mail" required>

            <label for="perfil">Você é:</label>
            <select id="perfil" name="perfil" required>
                <option value="">Selecione</option>
                <option value="crianca">Criança</option>
                <option value="adolescente">Adolescente</option>
                  <option value="adolescente">Adulto</option>
                  <option value="adolescente">pessoa com idade avancada</option>
            </select>

            <label for="comentario">O que você espera aprender/colher?</label>
            <textarea id="comentario" name="comentario" rows="4" placeholder="Escreva aqui..." required></textarea>

        
            <form id="meuFormulario">
      <button id="enviarBtn">enviar</button>
  <div id="mensagem">Concluído com sucesso!</div>


            
        </form>
        <br> <br>
 <button type="submit" class="btn-entrar"><a href="index3.html" style="color: aliceblue; text-decoration: none;">entrar</button>
        <br> <br>
        <a href="index.html">
            <button class="btn-voltar">⬅ voltar</button>
        </a>
    </div>

    <script src="script.js"></script>
  <script>
    const botao = document.getElementById("enviarBtn");
    const mensagem = document.getElementById("mensagem");

    botao.addEventListener("click", () => {
      mensagem.style.display = "block";
    });
  </script>


</body>

</html>
